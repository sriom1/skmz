name: SonarQube Analysis

# Runs on every push to main branches and on every pull request,
# per the validation requirement.
on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test-and-scan:
    name: Test, Coverage & SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # SonarQube needs full git history for accurate blame/new-code analysis
          fetch-depth: 0

      # ---------- Python: install, test, coverage ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-cov

      - name: Run Python tests with coverage
        run: |
          pytest --cov=. --cov-report=xml:coverage.xml --cov-report=term \
            --junitxml=pytest-report.xml || true
        # `|| true` keeps the job alive so SonarQube still receives results even if
        # some tests fail; remove this if you want a failing test suite to block
        # the whole workflow outright.

      # ---------- JavaScript: install, lint, test (if package.json exists) ----------
      - name: Set up Node.js
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS dependencies
        if: hashFiles('package.json') != ''
        run: npm ci

      - name: Run JS tests with coverage
        if: hashFiles('package.json') != ''
        run: npm test -- --coverage || true

      # ---------- SonarQube Scan ----------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
