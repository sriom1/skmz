# SonarQube Cloud project configuration
# Fill in the two CHANGE_ME values from your SonarCloud project's Overview page.

sonar.projectKey=<sriom1_skmz: e.g. my-org_my-repo>
sonar.organization=<sriom1: your SonarCloud org key>

sonar.projectName=<skmz: human-readable project name>

# Source root — adjust if your code lives under e.g. src/ or app/
sonar.sources=.

# Exclude generated, vendored, and non-source paths from analysis
sonar.exclusions=**/node_modules/**,**/venv/**,**/.venv/**,**/dist/**,**/build/**,**/*.min.js,**/migrations/**,**/vendor/**

# Exclude the same paths (plus test dirs) from coverage requirements
sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/*_test.py,**/conftest.py,**/*.spec.js,**/*.test.js

# Test source locations
sonar.tests=tests
sonar.test.inclusions=**/test_*.py,**/*_test.py,**/*.spec.js,**/*.test.js

# --- Python coverage ---
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=pytest-report.xml

# --- JavaScript/TypeScript coverage (if the repo has JS) ---
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language-specific notes:
# - Smarty and Mako templates are treated as generic text by Sonar's built-in analyzers;
#   there's no dedicated Smarty/Mako plugin in SonarCloud, so expect them to show up
#   mainly under duplication/size metrics rather than deep static analysis.
# - Shell scripts are analyzed natively (ShellCheck-based rules).
# - Dockerfile is analyzed natively (hadolint-based rules).
# - HTML gets basic structural analysis.

sonar.sourceEncoding=UTF-8
