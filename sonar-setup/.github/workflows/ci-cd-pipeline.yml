name: CI/CD Pipeline

# Stage 1: Source Code Checkout trigger
on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Environment to deploy to on manual run"
        required: false
        default: "dev"
        type: choice
        options: [dev, staging, prod]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ---------------------------------------------------------------------
  # Stage 2: Build — install dependencies
  # ---------------------------------------------------------------------
  build:
    name: "2. Build - Compile Go server & React app"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build Go server
        working-directory: server
        run: |
          go mod download
          go build -o /dev/null ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: Build React app
        working-directory: webapp
        run: |
          npm ci
          CI=true npm run build

  # ---------------------------------------------------------------------
  # Stage 3: Code Quality & Static Analysis — SonarQube Scan
  # ---------------------------------------------------------------------
  code_quality:
    name: "3. SonarQube Scan"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Go test with coverage (feeds Sonar)
        working-directory: server
        run: go test ./... -coverprofile=coverage.out -covermode=atomic || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      - name: JS test with coverage (feeds Sonar)
        working-directory: webapp
        run: |
          npm ci
          CI=true npm test -- --coverage --watchAll=false || true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ---------------------------------------------------------------------
  # Stage 4: Unit Testing — execute tests, generate reports
  # ---------------------------------------------------------------------
  unit_test:
    name: "4. Unit Testing"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      # "mvn test" has no equivalent here — the server is Go. Run Go unit tests
      # with coverage (coverage.out is the report Sonar/artifacts consume).
      # NOTE: go.mod pins Go 1.13, which does not support `go install pkg@version`,
      # so JUnit-XML conversion via go-junit-report is intentionally omitted.
      - name: Run Go tests
        working-directory: server
        run: go test ./... -v -coverprofile=coverage.out -covermode=atomic

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"
          cache-dependency-path: webapp/package-lock.json

      # "npm test": run React tests with coverage (lcov.info is the report).
      - name: Run React tests
        working-directory: webapp
        run: |
          npm ci
          CI=true npm test -- --coverage --watchAll=false

      - name: Upload test reports
        if: always()  # publish reports even when a test fails
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            server/coverage.out
            webapp/coverage/lcov.info

  # ---------------------------------------------------------------------
  # Stage 5: Security Scanning — dependency + container scan via Trivy
  # ---------------------------------------------------------------------
  security_scan:
    name: "5. Security Scanning (Trivy)"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Trivy filesystem/dependency scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0" # set to "1" once you want the pipeline to hard-fail on findings
          format: "table"
          output: "trivy-fs-report.txt"

      - name: Upload dependency scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt

  # ---------------------------------------------------------------------
  # Stage 6: Package / Artifact Creation — build Docker image
  # ---------------------------------------------------------------------
  package:
    name: "6. Package - Docker Image"
    needs: [code_quality, unit_test, security_scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy container image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: "table"
          output: "trivy-image-report.txt"

      - name: Upload image scan report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-image-report.txt

      - name: Save image as artifact for downstream jobs
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -o image.tar

      - name: Upload image tarball
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

  # ---------------------------------------------------------------------
  # Stage 7: Push Artifact — publish to Docker Hub
  # ---------------------------------------------------------------------
  push_artifact:
    name: "7. Push Artifact to Docker Hub"
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Download image tarball
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image tags
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:latest

  # ---------------------------------------------------------------------
  # Stage 8: Deploy to Development
  # ---------------------------------------------------------------------
  deploy_dev:
    name: "8. Deploy to Dev"
    needs: push_artifact
    if: github.ref == 'refs/heads/develop' || github.event.inputs.deploy_target == 'dev'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kubeconfig (Dev)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes Dev namespace
        run: |
          export IMAGE_TAG=${{ env.IMAGE_TAG }}
          envsubst < deploy/k8s/dev-deployment.yaml | kubectl apply -n dev -f -
          kubectl rollout status deployment/app-dev -n dev --timeout=180s

      - name: Smoke test
        run: bash scripts/smoke-test.sh "${{ secrets.DEV_APP_URL }}"

  # ---------------------------------------------------------------------
  # Stage 9: Integration Testing — Postman/Newman
  # ---------------------------------------------------------------------
  integration_test:
    name: "9. Integration Testing (Newman)"
    needs: deploy_dev
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Postman collection via Newman
        uses: matt-ball/newman-action@master
        with:
          collection: postman/health-check-collection.json
          environment: postman/dev-environment.json
          reporters: cli

  # ---------------------------------------------------------------------
  # Stage 10: Approval Gate — intentionally SKIPPED per requirements
  # (GitHub Environment protection rules can still be configured manually
  #  on the "staging" and "production" environments in repo Settings if
  #  you change your mind later — see SONARQUBE_SETUP_GUIDE.md notes.)
  # ---------------------------------------------------------------------

  # ---------------------------------------------------------------------
  # Stage 11: Deploy to Staging / UAT
  # ---------------------------------------------------------------------
  deploy_staging:
    name: "11. Deploy to Staging/UAT"
    needs: integration_test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event.inputs.deploy_target == 'staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kubeconfig (Staging)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy to Kubernetes Staging namespace
        run: |
          export IMAGE_TAG=${{ env.IMAGE_TAG }}
          envsubst < deploy/k8s/staging-deployment.yaml | kubectl apply -n staging -f -
          kubectl rollout status deployment/app-staging -n staging --timeout=180s

      - name: Business validation smoke test
        run: bash scripts/smoke-test.sh "${{ secrets.STAGING_APP_URL }}"

  # ---------------------------------------------------------------------
  # Stage 12: Production Deployment — Rolling or Blue-Green
  # ---------------------------------------------------------------------
  deploy_prod:
    name: "12. Deploy to Production"
    needs: deploy_staging
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.event.inputs.deploy_target == 'prod'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up kubeconfig (Prod)
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > ~/.kube/config

      - name: Rolling update deployment
        if: vars.PROD_DEPLOY_STRATEGY != 'blue-green'
        run: |
          export IMAGE_TAG=${{ env.IMAGE_TAG }}
          envsubst < deploy/k8s/prod-deployment-rolling.yaml | kubectl apply -n prod -f -
          kubectl rollout status deployment/app-prod -n prod --timeout=300s

      - name: Blue-Green deployment
        if: vars.PROD_DEPLOY_STRATEGY == 'blue-green'
        run: |
          export IMAGE_TAG=${{ env.IMAGE_TAG }}
          bash scripts/blue-green-deploy.sh

  # ---------------------------------------------------------------------
  # Stage 13: Post-Deployment Validation
  # ---------------------------------------------------------------------
  post_deploy_validation:
    name: "13. Post-Deployment Validation"
    needs: deploy_prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Health check
        run: bash scripts/smoke-test.sh "${{ secrets.PROD_APP_URL }}"

  # ---------------------------------------------------------------------
  # Stage 14: Monitoring & Alerting — annotate Grafana with the deploy
  # ---------------------------------------------------------------------
  monitoring_annotation:
    name: "14. Monitoring - Grafana Deploy Marker"
    needs: post_deploy_validation
    runs-on: ubuntu-latest
    steps:
      - name: Push deployment annotation to Grafana
        run: |
          bash scripts/grafana-annotate.sh \
            "${{ secrets.GRAFANA_URL }}" \
            "${{ secrets.GRAFANA_API_KEY }}" \
            "Production deploy ${{ env.IMAGE_TAG }} by ${{ github.actor }}"
