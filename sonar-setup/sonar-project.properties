# SonarQube Cloud project configuration — skmz (Go backend + React frontend)
# Keys below match this repository's existing SonarCloud project.

sonar.projectKey=sriom1_skmz
sonar.organization=sriom1

sonar.projectName=skmz

# Source roots — Go server + React web app source
sonar.sources=server,webapp/src

# Test source locations
sonar.tests=server,webapp/src
sonar.test.inclusions=**/*_test.go,**/*.test.js,**/*.spec.js

# Exclude generated, vendored, and non-source paths from analysis
sonar.exclusions=**/node_modules/**,**/vendor/**,webapp/build/**,server/gql/gen/**,**/*.min.js

# Exclude generated code and test files from coverage requirements
sonar.coverage.exclusions=server/gql/gen/**,**/*_test.go,**/*.test.js,**/*.spec.js,webapp/src/setupTests.js,webapp/src/index.js

# --- Go coverage ---
# Produced in the pipeline with (run inside ./server):
#   go test ./... -coverprofile=coverage.out
sonar.go.coverage.reportPaths=server/coverage.out

# --- JavaScript coverage ---
# Produced by CRA/Jest (run inside ./webapp):
#   CI=true npm test -- --coverage --watchAll=false
sonar.javascript.lcov.reportPaths=webapp/coverage/lcov.info

# Language notes for this repo:
# - Go is analyzed natively by SonarCloud's Go analyzer.
# - JavaScript/JSX (React) is analyzed natively; coverage comes from Jest's lcov report.
# - The gqlgen-generated file (server/gql/gen/generated.go) is excluded as machine-generated.
# - The Dockerfile and shell scripts are analyzed natively (hadolint / ShellCheck rules).

sonar.sourceEncoding=UTF-8
